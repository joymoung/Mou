name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure Node.js 18 (fallback installer)
        run: |
          if ! command -v node >/dev/null 2>&1; then
            echo "Node not found — installing Node 18 from NodeSource"
            curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash -
            sudo apt-get install -y nodejs
          else
            echo "Node already installed"
          fi
          node --version
          npm --version
        shell: bash

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run lint
        run: npm run lint --if-present

      - name: Build
        env:
          CI: true
        run: npm run build

      - name: Run production server and test mock endpoint
        run: |
          nohup npm run start -- -p 3000 > server.log 2>&1 &
          sleep 5
          curl -f --max-time 10 http://127.0.0.1:3000/api/mock-chat || (cat server.log; exit 1)
        shell: bash
